<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>VKT e-Business Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --bg-dark: #121212;
      --card-bg: rgba(30, 30, 30, 0.7);
      --accent: #00E676;
    }
    body {
      font-family: 'Sarabun', sans-serif;
      background-color: var(--bg-dark);
      color: #fff;
      min-height: 100vh;
    }
    .view-section { display: none; }
    .view-section.active { display: block; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
    }
    
    /* Search List */
    .emp-list-item {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px; margin-bottom: 8px; padding: 12px 15px;
      cursor: pointer; transition: 0.2s;
    }
    .emp-list-item:hover { background: rgba(0, 230, 118, 0.1); border-color: var(--accent); }
    
    .spinner-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body class="bg-dark">

  <div id="loader" class="spinner-wrapper">
    <div class="spinner-border text-success" style="width: 3rem; height: 3rem;"></div>
    <h5 class="mt-3 text-success">กำลังโหลดข้อมูล...</h5>
  </div>

  <div id="view-admin" class="view-section container py-4 mx-auto" style="max-width: 600px;">
    <div class="text-center mb-4">
      <h3 class="text-success fw-bold"><i class="bi bi-qr-code-scan me-2"></i>ระบบสร้างนามบัตร (Admin)</h3>
      <p class="text-muted small">ค้นหารายชื่อพนักงานเพื่อดึง QR Code ไปสั่งพิมพ์</p>
    </div>

    <div class="input-group mb-4 shadow-sm">
      <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-search"></i></span>
      <input type="text" id="searchInput" class="form-control bg-dark text-white border-secondary shadow-none" placeholder="ค้นหาชื่อ, รหัสพนักงาน..." onkeyup="filterList()">
    </div>

    <div id="empList" class="overflow-auto pe-2" style="max-height: 60vh;">
      </div>
  </div>

  <div class="modal fade" id="qrModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content bg-dark border border-secondary text-center p-4">
        <h5 id="qrEmpName" class="text-white fw-bold mb-1">...</h5>
        <p id="qrEmpPos" class="text-success small mb-3">...</p>
        <div class="bg-white p-2 rounded d-inline-block mx-auto mb-3">
          <img id="qrImage" src="" alt="QR Code" width="200" height="200">
        </div>
        <div class="d-grid gap-2">
          <a id="downloadQrBtn" href="#" download="QRCode.png" class="btn btn-success rounded-pill fw-bold"><i class="bi bi-download me-2"></i>บันทึกรูป QR Code</a>
          <button class="btn btn-outline-secondary rounded-pill" onclick="copyLink()"><i class="bi bi-link-45deg me-2"></i>คัดลอกลิงก์</button>
        </div>
      </div>
    </div>
  </div>

  <div id="view-vcard" class="view-section container py-5 mx-auto" style="max-width: 500px;">
    <div class="glass-card text-center overflow-hidden position-relative shadow-lg">
      <div style="height: 140px; background: linear-gradient(135deg, #00E676 0%, #007bb5 100%);"></div>
      
      <div class="card-body p-4 pt-0 position-relative">
        <div class="position-relative d-inline-block mb-3" style="margin-top: -70px;">
          <img id="vcPhoto" src="" class="rounded-circle shadow-lg object-fit-cover" style="width: 140px; height: 140px; background-color: #222; border: 4px solid #121212;">
        </div>
        
        <h3 id="vcName" class="fw-bold mb-1 text-white">...</h3>
        <p id="vcPosition" class="text-success fw-bold mb-4">...</p>
        
        <div class="bg-black bg-opacity-25 rounded-4 p-3 mb-4 border border-secondary border-opacity-25 text-start">
          <div class="d-flex align-items-center mb-3">
            <div class="bg-dark rounded p-2 me-3 text-success"><i class="bi bi-telephone-fill fs-5"></i></div>
            <div>
              <small class="text-muted d-block" style="font-size: 0.75rem;">เบอร์โทรศัพท์</small>
              <a id="vcPhone" href="#" class="text-white text-decoration-none fw-bold fs-5">...</a>
            </div>
          </div>
          <div class="d-flex align-items-center">
            <div class="bg-dark rounded p-2 me-3 text-info"><i class="bi bi-building fs-5"></i></div>
            <div>
              <small class="text-muted d-block" style="font-size: 0.75rem;">บริษัท</small>
              <span class="text-white fw-bold">VKT Transport System</span>
            </div>
          </div>
        </div>

        <button onclick="saveContact()" class="btn btn-success w-100 rounded-pill py-3 fw-bold shadow-lg text-dark" style="background: linear-gradient(135deg, #00E676, #00C853);">
          <i class="bi bi-person-plus-fill me-2"></i>บันทึกลงรายชื่อติดต่อ
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    // ** ใส่ Web App URL ที่เพิ่ง Deploy ใหม่ตรงนี้ **
    const API_URL = "https://script.google.com/macros/s/AKfycbyOFq4yA2YaCvA5w9OXlM4wu5lGqCEt6AnMn-2_Pw_Fl-YpIB5hzAFM5YFIVlSPd7Tu-A/exec";
    
    let allEmployees = [];
    let currentVcardLink = "";
    let vcardData = null;

    window.onload = async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const userParam = urlParams.get('user'); // จับ parameter ?user=VKT...

      if (userParam) {
        document.getElementById('view-vcard').classList.add('active');
        await loadVCard(userParam);
      } else {
        document.getElementById('view-admin').classList.add('active');
        await loadAdminList();
      }
    };

    async function callAPI(payload) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.status === 'success') return result.data;
        throw new Error(result.message);
      } catch (err) {
        Swal.fire('Error', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
        throw err;
      }
    }

    // ==========================================
    // สำหรับหน้า Admin
    // ==========================================
    async function loadAdminList() {
      try {
        allEmployees = await callAPI({ action: 'getAllEmployees' });
        renderList(allEmployees);
        document.getElementById('loader').style.display = 'none';
      } catch (e) {
        document.getElementById('loader').style.display = 'none';
      }
    }

    function renderList(list) {
      const container = document.getElementById('empList');
      if (list.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-4">ไม่พบข้อมูลพนักงาน</div>';
        return;
      }
      
      let html = '';
      list.forEach(emp => {
        html += `
          <div class="emp-list-item d-flex justify-content-between align-items-center" onclick="showQR('${emp.empId}', '${emp.name}', '${emp.position}')">
            <div>
              <div class="fw-bold text-white">${emp.name}</div>
              <div class="small text-muted">${emp.empId} | ${emp.position}</div>
            </div>
            <i class="bi bi-qr-code text-success fs-3"></i>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function filterList() {
      const txt = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allEmployees.filter(e => e.name.toLowerCase().includes(txt) || e.empId.toLowerCase().includes(txt));
      renderList(filtered);
    }

    function showQR(empId, name, position) {
      // ดึง URL ปัจจุบันมาตัดพารามิเตอร์ทิ้ง แล้วต่อด้วย ?user=ID
      const baseUrl = window.location.href.split('?')[0]; 
      currentVcardLink = baseUrl + "?user=" + empId;
      
      const qrUrl = "https://quickchart.io/qr?size=400&text=" + encodeURIComponent(currentVcardLink);
      
      document.getElementById('qrEmpName').innerText = name;
      document.getElementById('qrEmpPos').innerText = position;
      
      const qrImg = document.getElementById('qrImage');
      qrImg.src = ""; // เคลียร์ภาพเก่า
      qrImg.src = qrUrl;

      // เซ็ตลิงก์ให้ปุ่มดาวน์โหลด (ต้องแปลงภาพ QR เป็น Data URI ก่อนถึงจะโหลดข้ามโดเมนได้ แต่ใช้ URL ตรงๆ กดปุ๊บจะเปิดหน้าใหม่แทน แอดมินคลิกขวาเซฟได้)
      document.getElementById('downloadQrBtn').href = qrUrl;
      document.getElementById('downloadQrBtn').setAttribute('target', '_blank');

      new bootstrap.Modal(document.getElementById('qrModal')).show();
    }

    function copyLink() {
      navigator.clipboard.writeText(currentVcardLink).then(() => {
        Swal.fire({toast: true, position: 'top', icon: 'success', title: 'คัดลอกลิงก์แล้ว', showConfirmButton: false, timer: 1500, background: '#222', color: '#fff'});
      });
    }

    // ==========================================
    // สำหรับหน้าแสดงนามบัตร
    // ==========================================
    async function loadVCard(empId) {
      try {
        const res = await callAPI({ action: 'getVCardData', empId: empId });
        document.getElementById('loader').style.display = 'none';
        
        if (res.success) {
          vcardData = res;
          document.getElementById('vcPhoto').src = res.photo;
          document.getElementById('vcName').innerText = res.name;
          document.getElementById('vcPosition').innerText = res.position;
          document.getElementById('vcPhone').innerText = res.phone;
          document.getElementById('vcPhone').href = "tel:" + res.phone;
        } else {
          Swal.fire({icon: 'error', title: 'ผิดพลาด', text: res.message, background: '#222', color: '#fff'})
              .then(() => window.location.href = window.location.href.split('?')[0]); // เด้งกลับหน้าแอดมิน
        }
      } catch (e) {
        document.getElementById('loader').style.display = 'none';
      }
    }

    function saveContact() {
      if(!vcardData) return;
      var d = vcardData;
      var vcf = "BEGIN:VCARD\nVERSION:3.0\nN:;" + d.name + ";;;\nFN:" + d.name + "\nORG:VKT Transport System\nTITLE:" + d.position + "\nTEL;TYPE=CELL:" + d.phone + "\nEND:VCARD";
      
      var blob = new Blob([vcf], { type: "text/vcard" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = d.name + ".vcf";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  </script>
</body>
</html>
